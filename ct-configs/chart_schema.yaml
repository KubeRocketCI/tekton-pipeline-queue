"$schema": "http://json-schema.org/draft-07/schema#"
type: object
required:
  - apiVersion
  - name
  - version
properties:
  apiVersion:
    type: string
  name:
    type: string
  version:
    type: string
  kubeVersion:
    type: string
  description:
    type: string
  type:
    type: string
  keywords:
    type: array
    items:
      type: string
  home:
    type: string
  sources:
    type: array
    items:
      type: string
  dependencies:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        repository:
          type: string
        condition:
          type: string
        tags:
          type: array
          items:
            type: string
        import-values:
          type: array
          items:
            type: object
        alias:
          type: string
      required:
        - name
        - version
        - repository
  maintainers:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        url:
          type: string
      required:
        - name
  icon:
    type: string
  appVersion:
    type: string
  deprecated:
    type: boolean
  annotations:
    type: object
