apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: lane-isolation
spec:
  description: >
    A queueKey splits PipelineRuns into independent lanes: two pending runs
    with different lane label values are both admitted immediately (each
    lane has its own concurrency budget), and the queue reports two lanes.
  steps:
  - name: create-queue-and-runs
    try:
    - apply:
        file: queue.yaml
    - apply:
        file: runs.yaml
    - assert:
        file: assert-admitted.yaml
    - assert:
        file: assert-queue-status.yaml
