apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: run-lane-a
  labels:
    test: lane-isolation
    lane: a
spec:
  status: PipelineRunPending
  pipelineSpec:
    tasks:
    - name: sleeper
      taskSpec:
        steps:
        - name: sleep
          image: mirror.gcr.io/library/busybox:1.36
          command: ["sh", "-c", "sleep 300"]
---
