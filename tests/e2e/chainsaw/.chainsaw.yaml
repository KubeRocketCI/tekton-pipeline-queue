apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Configuration
metadata:
  name: configuration
spec:
  parallel: 1
  # failFast so a 00-install provisioning failure aborts the suite instead
  # of cascading the same error through every scenario.
  failFast: true
  fullName: true
  timeouts:
    apply: 30s
    assert: 60s
    error: 30s
    cleanup: 60s
    delete: 30s
    exec: 60s
