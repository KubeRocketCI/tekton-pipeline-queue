# No spec.status: already running (occupying), so runningCount stays
# observable regardless of the selector flapping below.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: run-1
  labels:
    test: invalid-selector
spec:
  pipelineSpec:
    tasks:
    - name: sleeper
      taskSpec:
        steps:
        - name: sleep
          image: mirror.gcr.io/library/busybox:1.36
          command: ["sh", "-c", "sleep 300"]
